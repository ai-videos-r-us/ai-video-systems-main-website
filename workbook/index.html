<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Founder Message Extraction Workbook — AI Video Systems</title>
  <meta name="description" content="Extract your founder expertise into a usable Founder Message Bank: content, ads, emails, and sales assets." />
  <link rel="stylesheet" href="style.css" />
  <!-- Client-side PDF generation (free, browser-side, no backend) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
</head>
<body>
  <!-- ============ LANDING ============ -->
  <section id="landing" class="landing" aria-label="Introduction"></section>

  <!-- ============ WORKBOOK APP ============ -->
  <div id="workbookApp" class="workbook-app hidden">
    <header class="app-header">
      <div class="app-header__inner">
        <button class="brand" id="brandHome" type="button" aria-label="Back to start">
          <img src="../assets/ai-video-systems-logo.png" alt="AI Video Systems" class="brand__logo"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
          <span class="brand__fallback" style="display:none;">AI VIDEO SYSTEMS</span>
        </button>
        <div class="app-header__meta">
          <span class="save-status" id="saveStatus">Ready</span>
          <span class="save-time" id="saveTime"></span>
        </div>
      </div>
      <div class="progress" role="progressbar" aria-label="Workbook progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
        <div class="progress__fill" id="progressFill"></div>
      </div>
      <div class="progress__label"><span id="progressPct">0%</span> complete</div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Workbook navigation"></aside>
      <main class="content" id="content" tabindex="-1"></main>
    </div>
  </div>

  <!-- ============ MODAL ROOT ============ -->
  <div id="modalRoot"></div>

  <!-- ============ TOAST ============ -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Hidden file input for JSON import -->
  <input type="file" id="importFile" accept="application/json,.json" class="visually-hidden" />

  <script src="script.js" defer></script>
</body>
</html>
